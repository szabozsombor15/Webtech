<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>User keresés</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

<h1>Felhasználó keresés</h1>

<input type="text" id="user-search-input" placeholder="Felhasználónév">
<button class="btn btn-primary" id="user-search-btn">Keresés</button>

<div id="user-result"></div>

<script src="script2.js"></script>

<script>
    async function loadUsers(searchText) {
        try {
            const res = await fetch('https://api.github.com/search/users?q='
                + encodeURIComponent(searchText));

            if (!res.ok) {
                throw Error('Hibás válasz: ' + res.status);
            }

            const data = await res.json();

            const resultDiv = document.querySelector('#user-result');
            resultDiv.innerHTML = '';

            for (const user of data.items) {
                const userHtml = `
                    <div class="card">
                        <img src="${user.avatar_url}" width="100">
                        <p>${user.login}</p>
                    </div>
                `;
                resultDiv.innerHTML += userHtml;
            }
        } catch (err) {
            console.error(err);
            alert('Hiba történt a keresés során.');
        }
    }

    const btn = document.querySelector('#user-search-btn');
    btn.addEventListener('click', () => {
        const input = document.querySelector('#user-search-input').value;

        if (input.trim() === '') {
            alert('Adj meg egy felhasználónevet!');
            return;
        }

        loadUsers(input);
    });
</script>

</body>
</html>
